appId: io.iclosed.billing
productName: iClosed Billing
files:
  - dist-electron/**
  - dist-ui/**
  - package.json
extraResources:
  # Bundle the Playwright browsers cache so the packaged app has Chromium.
  - from: "${env.PLAYWRIGHT_BROWSERS_PATH}"
    to: "ms-playwright"
asarUnpack:
  - "**/*.node"
  # iClosed engine + Playwright must be real files on disk (not inside the asar).
  - "dist-electron/electron/iclosed-flow.cjs"
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.developer-tools
